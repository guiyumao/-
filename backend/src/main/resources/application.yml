server:
    address: ${BACKEND_BIND_ADDRESS:0.0.0.0}
    port: ${BACKEND_PORT:8080}

spring:
    application:
        name: ${APP_NAME:lab-management-backend}
    datasource:
        url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:lab_management_system}?useUnicode=true&characterEncoding=utf8&serverTimezone=${APP_TIMEZONE:Asia/Shanghai}&allowPublicKeyRetrieval=true&useSSL=false
        username: ${DB_USERNAME:root}
        password: ${DB_PASSWORD:}
        driver-class-name: com.mysql.cj.jdbc.Driver
    jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        time-zone: ${APP_TIMEZONE:Asia/Shanghai}
        default-property-inclusion: non_null

mybatis-plus:
    configuration:
        map-underscore-to-camel-case: true
        log-impl: ${MYBATIS_LOG_IMPL:org.apache.ibatis.logging.nologging.NoLoggingImpl}
    global-config:
        db-config:
            logic-delete-field: is_deleted
            logic-delete-value: 1
            logic-not-delete-value: 0
            id-type: auto

springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        path: ${SWAGGER_PATH:/swagger-ui.html}
        tags-sorter: alpha
        operations-sorter: alpha

app:
    cors:
        allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
    reminder:
        days: ${APP_REMINDER_DAYS:30}
    security:
        jwt-secret: ${APP_JWT_SECRET}
        expire-minutes: ${APP_JWT_EXPIRE_MINUTES:720}
    initial-admin:
        enabled: ${APP_INIT_ADMIN_ENABLED:false}
        username: ${APP_INIT_ADMIN_USERNAME:}
        password: ${APP_INIT_ADMIN_PASSWORD:}
        real-name: ${APP_INIT_ADMIN_REAL_NAME:系统管理员}
        user-no: ${APP_INIT_ADMIN_USER_NO:admin}

openapi:
    title: ${OPENAPI_TITLE:Laboratory Management System API}
    version: ${OPENAPI_VERSION:1.0.0}
    description: ${OPENAPI_DESCRIPTION:Laboratory management backend API documentation}
    contact-name: ${OPENAPI_CONTACT_NAME:Laboratory Management Team}
    contact-email: ${OPENAPI_CONTACT_EMAIL:lab-admin@university.edu}
    external-docs-description: ${OPENAPI_EXTERNAL_DOCS_DESCRIPTION:Project README}
    external-docs-url: ${OPENAPI_EXTERNAL_DOCS_URL:http://127.0.0.1:8080/swagger-ui.html}
