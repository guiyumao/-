server:
    port: 8080

spring:
    application:
        name: lab-management-backend
    datasource:
        url: jdbc:mysql://127.0.0.1:3306/lab_management_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
        username: root
        password: root123456
        driver-class-name: com.mysql.cj.jdbc.Driver
    jackson:
        date-format: yyyy-MM-dd HH:mm:ss
        time-zone: Asia/Shanghai
        default-property-inclusion: non_null

mybatis-plus:
    configuration:
        map-underscore-to-camel-case: true
        log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    global-config:
        db-config:
            logic-delete-field: is_deleted
            logic-delete-value: 1
            logic-not-delete-value: 0
            id-type: auto

springdoc:
    api-docs:
        enabled: true
    swagger-ui:
        path: /swagger-ui.html
        tags-sorter: alpha
        operations-sorter: alpha

app:
    cors:
        allowed-origins:
            - http://localhost:5173
            - http://127.0.0.1:5173
    reminder:
        days: 30
    security:
        jwt-secret: lab-management-system-demo-secret-key-2026
        expire-minutes: 720
